services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-plant_access}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plant_access_password}
      POSTGRES_DB: ${POSTGRES_DB:-plant_access_control}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-plant_access} -d ${POSTGRES_DB:-plant_access_control}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
